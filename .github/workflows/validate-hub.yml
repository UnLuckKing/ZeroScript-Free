name: Validate ZeroScript One

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'bridge/**'
      - 'tools/**'
      - 'tests/**'
      - 'roblox-plugin/**'
      - 'zeroscript-extension/**'
      - '.github/workflows/validate-hub.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONPATH: app/core:app/ui:app/services

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Python syntax and tests
        run: |
          python -m compileall -q app bridge tools tests
          python -m unittest discover -s tests -v
      - name: JavaScript syntax
        run: find zeroscript-extension -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: JavaScript tests
        run: |
          for test in zeroscript-extension/test-*.js; do node "$test"; done
      - name: Version parity
        shell: python
        run: |
          import json, pathlib, re
          version = json.loads(pathlib.Path('zeroscript-extension/manifest.json').read_text('utf-8'))['version']
          bridge = pathlib.Path('bridge/bridge.py').read_text('utf-8')
          control = pathlib.Path('app/core/control_api.py').read_text('utf-8')
          assert re.search(r'^BRIDGE_VERSION = "([^"]+)"', bridge, re.M).group(1) == version
          assert re.search(r'^VERSION = "([^"]+)"', control, re.M).group(1) == version
          assert version == '1.34.0'
