name: Export OneMind source

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove git metadata
        run: rm -rf .git
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: onemind-source
          path: .
          include-hidden-files: true
          retention-days: 1
