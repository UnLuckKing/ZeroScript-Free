name: Export OneMind source

on:
  push:
    branches: [export-onemind-snapshot]
    paths-ignore:
      - '.onemind-export.b64'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: export-onemind-snapshot
      - name: Build repository snapshot
        run: |
          rm -f .onemind-export.b64
          tar --exclude=.git --exclude=.onemind-export.b64 -czf /tmp/onemind-source.tar.gz .
          base64 -w 0 /tmp/onemind-source.tar.gz > .onemind-export.b64
      - name: Commit snapshot to temporary branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .onemind-export.b64
          git commit -m "chore: generate temporary OneMind source snapshot"
          git push origin HEAD:export-onemind-snapshot
