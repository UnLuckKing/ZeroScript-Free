<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    body { width: 310px; margin: 0; font-family: "Segoe UI", sans-serif; background: #111318; color: #edf0f6; }
    .wrap { padding: 16px; }
    .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .title { display:flex; align-items:center; gap:9px; font-size:15px; font-weight:700; }
    .dot { width:10px; height:10px; border-radius:50%; background:#606774; }
    .dot.on { background:#34d399; box-shadow:0 0 9px rgba(52,211,153,.8); }
    .dot.warn { background:#fbbf24; box-shadow:0 0 9px rgba(251,191,36,.7); }
    #version { font-size:10px; color:#828a98; }
    .hero { padding:14px; background:#1a1e25; border-radius:12px; margin-bottom:10px; }
    #headline { font-size:17px; font-weight:700; margin-bottom:10px; }
    .status { font-size:12px; color:#b9c0cc; margin:5px 0; }
    .task { margin-top:11px; padding-top:10px; border-top:1px solid rgba(255,255,255,.08); font-size:12px; color:#e7eaf0; }
    button, select { width:100%; border:0; border-radius:9px; padding:9px 10px; margin-top:8px; font:12px "Segoe UI",sans-serif; }
    button { cursor:pointer; background:#2a303a; color:#f1f3f7; }
    button:hover { background:#343b47; }
    button.primary { background:#6d5dfc; font-weight:700; }
    button.primary:hover { background:#7b6cff; }
    button:disabled { opacity:.45; cursor:default; }
    select { background:#222731; color:#edf0f6; border:1px solid #353b47; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .hint { min-height:30px; margin-top:10px; color:#8f97a5; font-size:11px; line-height:1.35; }
    .foot { margin-top:11px; padding-top:10px; border-top:1px solid rgba(255,255,255,.07); color:#747d8c; font-size:10px; text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title"><span id="dot" class="dot"></span> ZeroScript</div>
      <div id="version">v…</div>
    </div>

    <div class="hero">
      <div id="headline">Kontrol ediliyor…</div>
      <div id="hub" class="status">Hub: …</div>
      <div id="bridge" class="status">Bridge: …</div>
      <div id="studio" class="status">Studio: …</div>
      <div id="models" class="status">Modeller: …</div>
      <div id="task" class="task">Aktif görev yok</div>
    </div>

    <button id="pair" class="primary">Hub ile eşleştir</button>

    <select id="provider">
      <option value="qwen">Qwen aç</option>
      <option value="gemini">Gemini aç</option>
      <option value="deepseek">DeepSeek aç</option>
      <option value="chatgpt">ChatGPT aç</option>
      <option value="claude">Claude aç</option>
      <option value="kimi">Kimi aç</option>
      <option value="mistral">Mistral aç</option>
    </select>
    <button id="openProvider">Model sekmesini aç ve hazırla</button>

    <div class="grid">
      <button id="stop">Görevi durdur</button>
      <button id="reconnect">Yeniden bağlan</button>
    </div>

    <div id="hint" class="hint">Ayarlar ve görevler artık ZeroScript Hub masaüstü uygulamasından yönetiliyor.</div>
    <div class="foot">Teknik ayarlar gizlendi; kalite, güvenlik ve çoklu model sistemi arkada çalışmaya devam eder.</div>
  </div>
  <script src="popup-simple.js"></script>
</body>
</html>
