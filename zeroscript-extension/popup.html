<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 280px; margin: 0; font-family: "Segoe UI", sans-serif; background: #16161a; color: #e8e8ec; }
    .wrap { padding: 14px; }
    h1 { font-size: 14px; margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
    .free { font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
            color: #34d399; background: rgba(52,211,153,.14); border: 1px solid rgba(52,211,153,.35);
            padding: 1px 5px; border-radius: 5px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #6b7280; }
    .dot.on { background: #34d399; box-shadow: 0 0 8px #34d399; }
    .dot.warn { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }
    .row { font-size: 12px; opacity: 0.85; margin: 6px 0; }
    .team { margin: 12px 0 8px; padding: 10px; border-radius: 9px; background: rgba(255,255,255,.06); }
    .team label { display:flex; align-items:center; justify-content:space-between; font-size:12px; font-weight:600; }
    .team input { width:auto; }
    .team select { box-sizing:border-box; width:100%; margin-top:6px; padding:6px; border-radius:6px; color:#e8e8ec; background:#24242a; border:1px solid #3b3b44; }
    .team textarea { box-sizing:border-box; width:100%; margin-top:8px; min-height:64px; resize:vertical; padding:7px; border-radius:6px; color:#e8e8ec; background:#24242a; border:1px solid #3b3b44; font:11px "Segoe UI",sans-serif; }
    .task-actions { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .task-actions button { margin-top:6px; }
    .doctor { white-space:pre-wrap; max-height:150px; overflow:auto; padding:8px; border-radius:8px; background:rgba(0,0,0,.18); }
    .queue { white-space:pre-wrap; max-height:145px; overflow:auto; padding:8px; border-radius:8px; background:rgba(0,0,0,.18); }
    details.advanced { margin-top:8px; border-top:1px solid rgba(255,255,255,.08); padding-top:7px; }
    details.advanced summary { cursor:pointer; font-size:11px; color:#a1a1aa; user-select:none; }
    button { width: 100%; margin-top: 8px; padding: 8px; border: 0; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .ghost { background: rgba(255,255,255,0.08); color: #e8e8ec; }
    .kofi { background: rgba(255,105,135,.16); color: #ff8fa3; border: 1px solid rgba(255,105,135,.4) !important; font-weight: 700; }
    code { background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1><span id="dot" class="dot"></span> ZeroScript <span class="free">Free</span> <span style="font-size:9px;opacity:.6">Multi-model</span></h1>
    <div class="row" id="state">Bridge: …</div>
    <div class="row" id="tools"></div>
    <div class="row" id="servers" style="white-space:pre-line; font-family:ui-monospace,monospace; opacity:0.75"></div>
    <div class="team">
      <label>Multi-model team <input type="checkbox" id="teamEnabled"></label>
      <label title="Start ZeroScript automatically on a new empty AI chat once bridge and Studio are ready.">Auto-start when ready <input type="checkbox" id="autoStart"></label>
      <select id="deepSeekSendMode" title="DeepSeek injection speed">
        <option value="fast">DeepSeek send: Fast</option>
        <option value="safe">DeepSeek send: Safe</option>
        <option value="ultra">DeepSeek send: Ultra Safe</option>
      </select>
      <select id="writer" title="Primary builder"></select>
      <select id="mapDesigner" title="Map designer"></select>
      <select id="uiDesigner" title="UI designer"></select>
      <select id="reviewer" title="Review model"></select>
      <select id="qa" title="QA and playtest model"></select>
      <select id="approvalMode" title="Studio write mode">
        <option value="autonomous">Studio writes: Automatic</option>
        <option value="review">Studio writes: Require approval</option>
      </select>
      <select id="taskTemplate" title="Ready task template">
        <option value="">Task template...</option>
        <option value="audit">Audit and finish project</option>
        <option value="errors">Fix runtime errors</option>
        <option value="security">Security and DataStore audit</option>
        <option value="ui">Professional responsive UI</option>
        <option value="map_polish">Popular game map polish</option>
        <option value="ui_premium">Premium simulator UI</option>
        <option value="presentation">Map + UI presentation pass</option>
        <option value="onboarding">New player onboarding</option>
        <option value="monetization">Gamepass shop polish</option>
        <option value="release">Prepare game for release</option>
      </select>
      <textarea id="teamGoal" placeholder="Describe the complete Roblox feature or fix..."></textarea>
      <button id="startTask">▶ Start automatic team task</button>
      <button class="ghost" id="scanProject">⌕ Scan current project</button>
      <button class="ghost" id="connectionDoctor">🩺 Connection Doctor</button>
      <div class="row doctor" id="doctorReport">Doctor has not run yet.</div>
      <div class="task-actions"><button class="ghost" id="autoFixPlan">☑ Auto-fix plan</button><button class="ghost" id="autoFixNext">▶ Start next</button></div>
      <div class="row queue" id="autoFixQueue">Auto-fix queue is empty.</div>
      <div class="task-actions"><button class="ghost" id="retryTask">↻ Retry</button><button class="ghost" id="cancelTask">■ Cancel</button></div>
      <button class="ghost" id="rollbackTask">↶ Rollback latest checkpoint</button>
      <div class="row" id="teamState">Single-model mode</div>
      <div class="row" id="teamHistory"></div>
      <div class="row" id="auditReport" style="white-space:pre-wrap;max-height:130px;overflow:auto"></div>
      <div class="row" id="approvalQueue"></div>
      <details class="advanced">
        <summary>Fallback handoff tools</summary>
        <select id="handoffTarget" title="Send context to another assistant">
          <option value="chatgpt">Handoff: ChatGPT</option>
          <option value="claude">Handoff: Claude</option>
          <option value="copilot">Handoff: Microsoft Copilot</option>
          <option value="mistral">Handoff: Mistral</option>
          <option value="perplexity">Handoff: Perplexity</option>
          <option value="poe">Handoff: Poe</option>
          <option value="roblox">Handoff: Roblox Assistant</option>
        </select>
        <button class="ghost" id="handoffTask">⇧ Copy fallback context</button>
      </details>
    </div>
    <button class="ghost" id="reconnect">↻ Reconnect bridge</button>
    <button class="ghost" id="restart">⟳ Restart Roblox server</button>
    <button class="kofi" id="kofi">♥ Tip the developer on Ko-fi</button>
    <div class="row" style="margin-top:10px; opacity:0.6">
      Run <code>python bridge.py</code>, open Roblox Studio, then open one or more supported AI tabs.
    </div>
  </div>
  <script src="popup.js"></script>
  <script src="popup-smart.js"></script>
  <script src="popup-providers.js"></script>
</body>
</html>
